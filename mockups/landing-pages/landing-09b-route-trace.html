<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trail Planner — Route trace concept</title>
    <link rel="stylesheet" href="landing.css">
    <style>
      .route-trace { background:#f7f4e9; }
      .trace-main { display:grid; grid-template-rows:1fr auto; min-height:0; gap:18px; padding-top:18px; }
      .trace-map { position:relative; min-height:0; overflow:hidden; border-radius:38px; background:#d9e2d5 url("assets/highland-atlas-map.webp") center / cover no-repeat; box-shadow:var(--shadow); }
      .trace-map::before { position:absolute; z-index:1; inset:0; background:linear-gradient(105deg,rgba(247,244,233,.93) 0,rgba(247,244,233,.78) 31%,rgba(247,244,233,.18) 58%,rgba(247,244,233,.03) 100%); content:""; }
      .trace-copy { position:relative; z-index:4; display:grid; width:min(57%,720px); gap:17px; padding:clamp(28px,4.6vw,64px); }
      .trace-copy h1 { max-width:690px; font-size:clamp(43px,5.4vw,78px); }
      .trace-copy .intro { max-width:510px; }
      .journey-route { position:absolute; z-index:3; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
      .route-halo { fill:none; stroke:rgba(255,253,247,.72); stroke-width:7; stroke-linecap:round; vector-effect:non-scaling-stroke; }
      .route-dashes { fill:none; stroke:#a93f32; stroke-width:3; stroke-linecap:round; stroke-dasharray:5 11; vector-effect:non-scaling-stroke; }
      .route-point { position:absolute; z-index:4; display:block; box-sizing:border-box; border-radius:50%; transform:translate(-50%,-50%); }
      .route-origin { width:16px; height:16px; left:3.17%; top:80.65%; border:4px solid rgba(255,253,247,.92); background:#a93f32; box-shadow:0 2px 7px rgba(63,42,31,.2); }
      .route-destination { width:24px; height:24px; left:96.83%; top:10%; border:3px solid #a93f32; background:rgba(255,253,247,.9); box-shadow:0 2px 8px rgba(63,42,31,.18); }
      .route-destination::after { position:absolute; width:7px; height:7px; inset:50% auto auto 50%; border-radius:50%; background:#a93f32; content:""; transform:translate(-50%,-50%); }
      .destination-note { position:absolute; z-index:4; top:8.5%; right:4.5%; display:grid; gap:2px; padding:8px 11px; border:1px solid rgba(255,255,255,.72); border-radius:11px; background:rgba(255,253,247,.82); box-shadow:0 7px 18px rgba(24,55,45,.11); font-size:10px; font-weight:780; backdrop-filter:blur(8px); }
      .destination-note small { color:var(--muted); font-size:8px; font-weight:650; letter-spacing:.08em; text-transform:uppercase; }
      .trace-main .inline-planner { position:relative; z-index:6; width:calc(100% - 60px); justify-self:center; margin-bottom:-34px; transform:translateY(-44px); }
      @media(max-width:900px){
        .trace-map::before { background:linear-gradient(110deg,rgba(247,244,233,.94) 0,rgba(247,244,233,.82) 54%,rgba(247,244,233,.12) 82%); }
        .trace-copy { width:76%; gap:12px; padding:22px; }
        .trace-copy h1 { font-size:clamp(38px,9vw,52px); }
        .trace-copy .intro { font-size:12px; }
        .destination-note { top:5%; right:3%; padding:6px 8px; }
        .trace-main .inline-planner { width:calc(100% - 24px); margin-bottom:-20px; transform:translateY(-24px); }
      }
      @media(max-width:520px){
        .trace-copy { width:82%; padding:20px 18px; }
        .trace-copy .intro { display:none; }
        .destination-note span { display:none; }
        .destination-note small { font-size:7px; }
        .route-dashes { stroke-width:2.5; stroke-dasharray:4 10; }
        .route-trace .back-link { display:none; }
      }
    </style>
  </head>
  <body>
    <div class="screen route-trace">
      <div class="shell">
        <header class="nav"><a class="brand" href="index.html"><span class="brand-mark">T</span>Trail Planner</a><div class="nav-actions"><a class="nav-link" href="#">Planned trips</a><button class="ghost-button" type="button">Sign in with Google</button></div></header>
        <main class="trace-main">
          <section class="trace-map">
            <svg class="journey-route" viewBox="0 0 1200 620" preserveAspectRatio="none" aria-hidden="true">
              <path class="route-halo" d="M38 500 C128 455 184 520 286 478 C375 441 425 512 520 438 C605 372 644 430 720 367 C790 309 827 319 870 253 C916 184 980 211 1018 151 C1055 94 1105 104 1162 62" />
              <path class="route-dashes" d="M38 500 C128 455 184 520 286 478 C375 441 425 512 520 438 C605 372 644 430 720 367 C790 309 827 319 870 253 C916 184 980 211 1018 151 C1055 94 1105 104 1162 62" />
            </svg>
            <span class="route-point route-origin" aria-hidden="true"></span>
            <span class="route-point route-destination" aria-hidden="true"></span>
            <div class="trace-copy"><p class="eyebrow">A clearer route to the mountains</p><h1>Explore hiking destinations within your limits.</h1><p class="intro">See where you can reach, what the journey takes, and whether the month is right for rough-terrain hiking.</p></div>
            <div class="destination-note"><small>Possible destination</small><span>Mountain country</span></div>
          </section>
          <form class="inline-planner">
            <div class="inline-field"><label for="month-09b">Month</label><select id="month-09b"><option>September</option><option>August</option></select></div>
            <div class="inline-field"><label for="people-09b">Participants</label><select id="people-09b"><option>2 people</option><option>1 person</option></select></div>
            <div class="inline-field"><label for="days-09b">Trip length</label><select id="days-09b"><option>5 days</option><option>7 days</option></select></div>
            <div class="inline-field"><label for="budget-09b">Journey budget</label><input id="budget-09b" value="6,000 DKK"></div>
            <button class="primary-button" type="button">Explore <span class="arrow">→</span></button>
          </form>
        </main>
      </div>
      <a class="back-link" href="index.html" aria-label="Back to concepts">×</a>
    </div>
  </body>
</html>
